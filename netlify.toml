[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Basic-Auth = "rankforward:RankForwardAdmin2026"

[[headers]]
  for = "/portal/*"
  [headers.values]
    Basic-Auth = "rankforward:RF2026portal"

[[redirects]]
  from = "https://www.rankforward.ai/*"
  to = "https://rankforward.ai/:splat"
  status = 301
  force = true
